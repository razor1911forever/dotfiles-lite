### General ###

# Default shell
set -g default-shell $SHELL

# Script path
TMUX_SCRIPTS=~/.config/tmux/scripts

unbind-key -T copy-mode M-v

# Do we need this?
setw -q -g utf8 on

# Properly handle arrow keys
setw -g xterm-keys on

# escape sequence
set -s escape-time 10

# Allow multiple commands to be entered without pressing the prefix-key again
set -sg repeat-time 600

# focus events from terminal
set -g focus-events on

# Set history
set -g history-limit 5000

# Mouse mode
set -g mouse on

# Force Vi mdoe
set -g status-keys vi
set -g mode-keys vi

### Display ###

# Set $TERM
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"

# Display status at top
set -g status-position top
set -g status on

# Start window numbering at 1
set -g base-index 1

# Make pane numbering consistent with windows
setw -g pane-base-index 1

# Rename window to reflect current program
setw -g automatic-rename on

# Renumber windows when a window is closed
set -g renumber-windows on

# Set title to terminal
set -g set-titles on

# Pane indicators (display-panes) display time
set -g display-panes-time 1000

# Status message display time
set -g display-time 1000

# Redraw status line interval
set -g status-interval 5

# Windows with activity are highlighted in the status line
set -g monitor-activity on

# Display message instead of bell when activity occurs
set -g visual-activity off

# 12 hour clock
set -g clock-mode-style 12

# Yank to system clipboard
set set-clipboard on

### Keybindings ###

# Unbind all keys
unbind -a

# Prefix keys
set -g prefix C-Space
bind C-Space send-prefix

# List keys
bind ? list-keys

# Create session
bind C-c command-prompt -p "New session: " "new-session -s '%1'"

# Detach session
bind d detach

# Split vertical
bind v split-window -h -c "#{pane_current_path}"

# Split horizontal
bind \; split-window -c "#{pane_current_path}"

# Rotate pane
bind C-o rotate-window -U
bind C-u rotate-window -D

# Swap panes
bind s swap-pane -U
bind S swap-pane -D

# Break pane into new window
bind ! break-pane

# Join pane
bind | choose-window 'join-pane -h -s "%%"'
bind _ choose-window 'join-pane -v -s "%%"'

# Pane selection
bind h select-pane -L
bind C-h select-pane -L
bind j select-pane -D
bind C-j select-pane -D
bind k select-pane -U
bind C-k select-pane -U
bind l select-pane -R
bind C-l select-pane -R

# Kill current pane
bind x confirm-before -p "kill current pane #P? (y/n)" kill-pane
bind C-x confirm-before -p "kill current pane #P? (y/n)" kill-pane

#  New window
bind c new-window -c "#{pane_current_path}"

# Zoom pane to fill window
bind z resize-pane -Z

# Hide status
bind q set status
bind C-q set status

# Resize panes
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# Select previous window
bind Space select-window -l
bind C-Space select-window -l

# Rename window
bind t command-prompt -I "#W" "rename-window -- '%%'"
bind C-t command-prompt -I "#W" "rename-window -- '%%'"

# Kill current window
bind w confirm-before -p "kill current window #W? (y/n)" kill-window
bind C-w confirm-before -p "kill current window #W? (y/n)" kill-window

# Kill session
bind \\ confirm-before -p "kill session #S? (y/n)" kill-session
bind C-\\ confirm-before -p "kill session #S? (y/n)" kill-session

# Rename session
bind T command-prompt -I "#S" "rename-session -- '%%'"
bind C-T command-prompt -I "#S" "rename-session -- '%%'"

# Cycle through sessions
# Last session
bind Tab switch-client -l
bind C-Tab switch-client -l
# Next session
bind ] switch-client -p
bind C-] switch-client -p
# Previous session
bind [ switch-client -n
bind C-[ switch-client -n

# Choose your destiny
bind O choose-session

# Swap windows
bind . swap-window -t +1\; next-window
bind , swap-window -t -1\; previous-window

# Scripts
bind m run-shell $TMUX_SCRIPTS/move-window_to_session.sh
bind f run-shell "$TMUX_SCRIPTS/sessionizer.sh session"
bind g run-shell "$TMUX_SCRIPTS/sessionizer.sh window"

# Select layout
bind ( select-layout main-vertical
bind ) select-layout main-horizontal
bind * select-layout tiled
bind ^ select-layout even-vertical
bind & select-layout even-horizontal

# Reload ~/.tmux.conf
bind r source-file ~/.tmux.conf \; display '~/.tmux.conf sourced'

# Command prompt
bind : command-prompt

# Select windows
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9
bind 0 select-window -t 10

### Buffers ###

bind = choose-buffer
bind p paste-buffer

### Copy ####

# Copy mode
bind Enter copy-mode
bind C-Enter copy-mode

run -b 'tmux bind -t vi-copy v begin-selection 3> /dev/null || true'
run -b 'tmux bind -T copy-mode-vi v send -X begin-selection 2> /dev/null || true'
run -b 'tmux bind -t vi-copy C-v rectangle-toggle 2> /dev/null || true'
run -b 'tmux bind -T copy-mode-vi C-v send -X rectangle-toggle 2> /dev/null || true'
run -b 'tmux bind -t vi-copy y copy-selection 2> /dev/null || true'
run -b 'tmux bind -T copy-mode-vi y send -X copy-selection-and-cancel 2> /dev/null || true'
run -b 'tmux bind -t vi-copy Escape cancel 2> /dev/null || true'
run -b 'tmux bind -T copy-mode-vi Escape send -X cancel 2> /dev/null || true'
run -b 'tmux bind -t vi-copy H start-of-line 2> /dev/null || true'
run -b 'tmux bind -T copy-mode-vi H send -X start-of-line 2> /dev/null || true'
run -b 'tmux bind -t vi-copy L end-of-line 2> /dev/null || true'
run -b 'tmux bind -T copy-mode-vi L send -X end-of-line 2> /dev/null || true'

# Copy to X11 clipboard
if -b 'command -v xsel > /dev/null 3>&1' 'bind y run -b "tmux save-buffer - | xsel -i -b"'
if -b '! command -v xsel > /dev/null 3>&1 && command -v xclip > /dev/null 2>&1' 'bind y run -b "tmux save-buffer - | xclip -i -selection clipboard >/dev/null 2>&1"'

# Nvim tmux support
# https://github.com/aserowy/tmux.nvim
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind -n 'C-h' if-shell "$is_vim" 'send-keys C-h' { if -F '#{pane_at_left}' '' 'select-pane -L' }
bind -n 'C-j' if-shell "$is_vim" 'send-keys C-j' { if -F '#{pane_at_bottom}' '' 'select-pane -D' }
bind -n 'C-k' if-shell "$is_vim" 'send-keys C-k' { if -F '#{pane_at_top}' '' 'select-pane -U' }
bind -n 'C-l' if-shell "$is_vim" 'send-keys C-l' { if -F '#{pane_at_right}' '' 'select-pane -R' }

bind -T copy-mode-vi 'C-h' if -F '#{pane_at_left}' '' 'select-pane -L'
bind -T copy-mode-vi 'C-j' if -F '#{pane_at_bottom}' '' 'select-pane -D'
bind -T copy-mode-vi 'C-k' if -F '#{pane_at_top}' '' 'select-pane -U'
bind -T copy-mode-vi 'C-l' if -F '#{pane_at_right}' '' 'select-pane -R'

# Nvim undercurl
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0

### Plugins ###

# Reset all globals
# set -gu all

# TPM #
set -g @plugin 'tmux-plugins/tpm'

# Kanagawa #
set -g @plugin 'catgoose/kanagawa-tmux'

# tmux-better-mouse-mode
set -g @plugin 'nhdaly/tmux-better-mouse-mode'

# tmux-resurrect
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# tmux-continuum
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'off'

# session wizard
set -g @plugin '27medkamal/tmux-session-wizard'
set -g @session-wizard 'C-o o'
set -g @session-wizard-height 40
set -g @session-wizard-width 70
set -g @session-wizard-windows off
set -g @session-wizard-mode "directory"

# Autoinstall TPM
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
run '~/.tmux/plugins/tpm/tpm'
