services:
  dothog:
    image: ghcr.io/catgoose/dothog:latest
    container_name: dothog
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - PORT=3000
    volumes:
      - ./logs:/log
      - ./db:/db
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/jtye/.docker/config.json:/config.json:ro
    environment:
      - DOCKER_API_VERSION=1.45
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_LABEL_ENABLE=false
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: postgres
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_USER=vopts
      - POSTGRES_PASSWORD=vopts
      - POSTGRES_DB=vopts
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  vopts:
    image: ghcr.io/catgoose/vopts:latest
    container_name: vopts
    ports:
      - "127.0.0.1:30000:30000"
    environment:
      - ENV=production
      - SERVER_LISTEN_PORT=30000
      - APP_NAME=vopts
      - DATABASE_URL=postgres://vopts:vopts@postgres:5432/vopts?sslmode=disable
    volumes:
      - ./vopts-db:/db
    depends_on:
      - postgres
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  stocksimple:
    image: ghcr.io/catgoose/stocksimple:latest
    container_name: stocksimple
    ports:
      - "127.0.0.1:31000:31000"
    environment:
      - ENV=production
      - SERVER_LISTEN_PORT=31000
      - APP_NAME=StockSimple
      - DATABASE_URL=postgres://vopts:vopts@postgres:5432/stocksimple?sslmode=disable
    depends_on:
      - postgres
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
